name: Build & push fork image to GHCR

on:
  push:
    branches:
      - main
      - vendor/gdw
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag override (defaults to gdw-<upstream>-<sha> for vendor/gdw, upstream-mirror-<sha> for main)'
        required: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write   # required for cosign keyless OIDC signing
    outputs:
      image_digest: ${{ steps.build.outputs.digest }}
      image_tag: ${{ steps.tag.outputs.value }}
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
        with:
          submodules: recursive
          fetch-depth: 0   # need full history for git describe

      - name: Verify lockfile (no drift)
        run: |
          if [ ! -f package-lock.json ]; then
            echo "::error::package-lock.json missing"
            exit 1
          fi
          # `npm ci` exits non-zero if package.json and lockfile disagree.
          # We don't actually install deps here (Docker build does that) — just validate.
          node -e "const lock=require('./package-lock.json'); const pkg=require('./package.json'); if(lock.name!==pkg.name||lock.version!==pkg.version){console.error('lockfile name/version drift');process.exit(1)}"

      - name: Compute tag
        id: tag
        run: |
          set -euo pipefail
          SHORT_SHA="$(git rev-parse --short HEAD)"
          # Find the most recent upstream-style version tag reachable from HEAD.
          # Falls back to v0.0.0 if none.
          UPSTREAM_TAG="$(git describe --tags --abbrev=0 --match 'v[0-9]*' 2>/dev/null || echo 'v0.0.0')"

          if [[ -n "${{ inputs.tag }}" ]]; then
            echo "value=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            # main = upstream mirror; tag identifies it as such.
            echo "value=upstream-mirror-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          else
            echo "value=gdw-${UPSTREAM_TAG}-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130  # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3

      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9  # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (load locally for smoke test)
        id: build_local
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8  # v6
        with:
          context: .
          platforms: linux/amd64
          load: true
          tags: gdw-evolution:smoke
          labels: |
            org.opencontainers.image.source=https://github.com/brunubarbosa/evolution-api
            org.opencontainers.image.revision=${{ github.sha }}
            gdw.branch=${{ github.ref_name }}
            gdw.upstream_base=${{ steps.tag.outputs.value }}

      - name: Smoke test (boot image, hit /)
        run: |
          set -euo pipefail
          # Evolution needs a DB to boot; for the smoke test we point it at an in-memory
          # SQLite path so it can at least start the HTTP server. If config requires
          # postgres URI, skip and check binary boot instead.
          docker run -d --name smoke -p 18080:8080 \
            -e SERVER_TYPE=http \
            -e SERVER_PORT=8080 \
            -e AUTHENTICATION_API_KEY=smoke-test-key \
            -e DATABASE_ENABLED=false \
            -e CACHE_REDIS_ENABLED=false \
            -e CACHE_LOCAL_ENABLED=true \
            gdw-evolution:smoke || (docker logs smoke; exit 1)

          # Poll for up to 60s waiting for HTTP to come up.
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:18080/ >/dev/null 2>&1; then
              echo "Smoke OK after ${i} attempts"
              curl -sS http://localhost:18080/ | head -c 200
              docker stop smoke && docker rm smoke
              exit 0
            fi
            sleep 2
          done

          echo "::error::Smoke test failed — image did not respond on /"
          docker logs smoke
          exit 1

      - name: Trivy vulnerability scan (HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # master
        with:
          image-ref: gdw-evolution:smoke
          format: table
          exit-code: '1'
          severity: HIGH,CRITICAL
          ignore-unfixed: true   # don't block on unpatchable upstream CVEs

      - name: Build and push (multi-tag)
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8  # v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/brunubarbosa/evolution-api:${{ steps.tag.outputs.value }}
            ghcr.io/brunubarbosa/evolution-api:sha-${{ github.sha }}
            ${{ github.ref == 'refs/heads/vendor/gdw' && 'ghcr.io/brunubarbosa/evolution-api:vendor-gdw-latest' || '' }}
          labels: |
            org.opencontainers.image.source=https://github.com/brunubarbosa/evolution-api
            org.opencontainers.image.revision=${{ github.sha }}
            gdw.branch=${{ github.ref_name }}
            gdw.upstream_base=${{ steps.tag.outputs.value }}
          provenance: true
          sbom: true

      - name: Install cosign
        uses: sigstore/cosign-installer@f713795cb21599bc4e5c4b58cbad1da852d7eeb9  # v3

      - name: Sign image (keyless OIDC)
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          set -euo pipefail
          cosign sign --yes \
            "ghcr.io/brunubarbosa/evolution-api@${{ steps.build.outputs.digest }}"

      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610  # v0
        with:
          image: ghcr.io/brunubarbosa/evolution-api@${{ steps.build.outputs.digest }}
          format: spdx-json
          artifact-name: sbom-${{ steps.tag.outputs.value }}.spdx.json

      - name: Print published digest (copy this into Coolify)
        run: |
          echo "Published image:"
          echo "  ghcr.io/brunubarbosa/evolution-api:${{ steps.tag.outputs.value }}"
          echo "  ghcr.io/brunubarbosa/evolution-api@${{ steps.build.outputs.digest }}"
          echo ""
          echo "Verify signature:"
          echo "  cosign verify ghcr.io/brunubarbosa/evolution-api@${{ steps.build.outputs.digest }} \\"
          echo "    --certificate-identity-regexp 'https://github.com/brunubarbosa/evolution-api/.*' \\"
          echo "    --certificate-oidc-issuer https://token.actions.githubusercontent.com"
